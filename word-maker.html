<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>단어 노트 생성기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Noto Sans KR', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      color: #c084fc;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #a0a0c0;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"] {
      width: 100%;
      background: #0f0f1a;
      border: 1.5px solid #2a2a45;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 18px;
      color: #e8e8f0;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #c084fc; }
    input[type="text"]::placeholder { color: #444; }

    .toggle-group {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .toggle-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid #2a2a45;
      background: transparent;
      color: #888;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active {
      border-color: #c084fc;
      background: rgba(192, 132, 252, 0.12);
      color: #c084fc;
    }

    .btn-generate {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .btn-generate:active { opacity: 0.8; }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      text-align: center;
      font-size: 13px;
      color: #888;
      padding: 8px 0;
      min-height: 28px;
    }
    .status.loading { color: #c084fc; }
    .status.error   { color: #f87171; }
    .status.success { color: #4ade80; }

    .result-section { display: none; }
    .result-section.visible { display: block; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .info-item {
      background: #0f0f1a;
      border-radius: 10px;
      padding: 12px;
    }
    .info-item .key {
      font-size: 11px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-item .val {
      font-size: 15px;
      color: #e8e8f0;
      font-weight: 500;
    }
    .info-item.full { grid-column: span 2; }
    .info-item .val.badge {
      display: inline-block;
      background: rgba(192,132,252,0.15);
      color: #c084fc;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 13px;
    }

    .synonyms-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .synonym-tag {
      background: rgba(129,140,248,0.12);
      color: #818cf8;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 13px;
    }
    .antonym-tag {
      background: rgba(248,113,113,0.12);
      color: #f87171;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 13px;
    }
    .root-tag {
      background: rgba(74,222,128,0.12);
      color: #4ade80;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 13px;
    }

    .md-box {
      background: #0a0a14;
      border: 1px solid #2a2a45;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Menlo', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: #b0b0d0;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 360px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .btn-copy {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: 1.5px solid #4ade80;
      background: rgba(74,222,128,0.08);
      color: #4ade80;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-copy:active { background: rgba(74,222,128,0.2); }

    .how-to {
      background: rgba(192,132,252,0.06);
      border: 1px solid rgba(192,132,252,0.2);
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.8;
      color: #a0a0c0;
    }
    .how-to b { color: #c084fc; }
    .how-to ol { padding-left: 18px; }
    .how-to li { margin-bottom: 2px; }
  </style>
</head>
<body>

  <h1>📖 단어 노트 생성기</h1>
  <p class="subtitle">단어 입력 → 자동 분석 → 옵시디언에 붙여넣기</p>

  <div class="card">
    <label>단어 입력</label>
    <input type="text" id="wordInput" placeholder="예: describe, happy, transport…"
           autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
  </div>

  <div class="card">
    <label>볼트 선택</label>
    <div class="toggle-group">
      <button class="toggle-btn active" data-vault="haon">하온 (중1)</button>
      <button class="toggle-btn"        data-vault="hajin">하진 (중3)</button>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">✨ 노트 생성</button>
  <div class="status" id="status"></div>

  <!-- 결과 영역 -->
  <div class="result-section" id="resultSection">

    <div class="card">
      <div class="info-grid" id="infoGrid"></div>
    </div>

    <div class="card">
      <label style="margin-bottom:10px">마크다운 (복사 후 옵시디언에 붙여넣기)</label>
      <div class="md-box" id="mdBox"></div>
      <button class="btn-copy" onclick="copyMd()">📋 마크다운 복사</button>
    </div>

    <div class="how-to">
      <b>옵시디언 붙여넣기 방법</b>
      <ol>
        <li>위 <b>마크다운 복사</b> 버튼 탭</li>
        <li>옵시디언 → <b>02_단어</b> 폴더 열기</li>
        <li>새 노트 만들기 (+ 버튼)</li>
        <li>노트 제목: <b id="wordTitle"></b></li>
        <li>노트 본문 길게 탭 → <b>붙여넣기</b></li>
      </ol>
    </div>

  </div>

<script>
// ── 어원 데이터베이스 ──────────────────────────
const ROOTS = {
  scrib: { meaning:"쓰다 (write)",       origin:"라틴어 scribere",   keywords:["scrib","scrip","script"] },
  port:  { meaning:"나르다 (carry)",      origin:"라틴어 portare",    keywords:["port"] },
  dict:  { meaning:"말하다 (say)",        origin:"라틴어 dicere",     keywords:["dict","dic"] },
  aud:   { meaning:"듣다 (hear)",         origin:"라틴어 audire",     keywords:["aud","audit"] },
  vis:   { meaning:"보다 (see)",          origin:"라틴어 videre",     keywords:["vis","vid","view"] },
  duc:   { meaning:"이끌다 (lead)",       origin:"라틴어 ducere",     keywords:["duc","duct","duce"] },
  mit:   { meaning:"보내다 (send)",       origin:"라틴어 mittere",    keywords:["mit","miss"] },
  rupt:  { meaning:"깨다 (break)",        origin:"라틴어 rumpere",    keywords:["rupt"] },
  spect: { meaning:"보다 (look)",         origin:"라틴어 specere",    keywords:["spect","spec","spic"] },
  struct:{ meaning:"쌓다 (build)",        origin:"라틴어 struere",    keywords:["struct","stru"] },
  tract: { meaning:"끌다 (pull)",         origin:"라틴어 trahere",    keywords:["tract","trac"] },
  vert:  { meaning:"돌리다 (turn)",       origin:"라틴어 vertere",    keywords:["vert","vers"] },
  voc:   { meaning:"부르다 (call)",       origin:"라틴어 vocare",     keywords:["voc","voke"] },
  gen:   { meaning:"태어나다 (birth)",    origin:"라틴어 genus",      keywords:["gen"] },
  graph: { meaning:"쓰다/그리다 (write)", origin:"그리스어 graphein", keywords:["graph","gram"] },
  log:   { meaning:"말/이성 (word)",      origin:"그리스어 logos",    keywords:["log","logue","logy"] },
  phon:  { meaning:"소리 (sound)",        origin:"그리스어 phone",    keywords:["phon","phone"] },
  bio:   { meaning:"생명 (life)",         origin:"그리스어 bios",     keywords:["bio"] },
  geo:   { meaning:"땅 (earth)",          origin:"그리스어 ge",       keywords:["geo"] },
};

const PREFIXES = {
  de:"완전히/아래로", sub:"아래에", pre:"미리/앞에", trans:"가로질러",
  ex:"밖으로", im:"안으로", in:"안에/부정", re:"다시/뒤로",
  con:"함께", com:"함께", pro:"앞으로", inter:"사이에",
  super:"위에/초월", anti:"반대", un:"부정", dis:"부정/반대",
  over:"지나치게", out:"밖으로/능가", mis:"잘못",
};

function detectRoot(word) {
  const w = word.toLowerCase();
  for (const [name, info] of Object.entries(ROOTS)) {
    if (info.keywords.some(k => w.includes(k))) return name;
  }
  return null;
}

function detectPrefix(word) {
  const w = word.toLowerCase();
  for (const [p, meaning] of Object.entries(PREFIXES)) {
    if (w.startsWith(p) && w.length > p.length + 2) return [p, meaning];
  }
  return [null, null];
}

// ── API 호출 ──────────────────────────────────
async function fetchEnglish(word) {
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data[0] ?? null;
  } catch { return null; }
}

async function fetchKorean(word) {
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|ko`;
    const res = await fetch(url);
    const data = await res.json();
    const kr = data?.responseData?.translatedText ?? "";
    return (kr && kr !== word) ? kr : "";
  } catch { return ""; }
}

// ── 노트 생성 ─────────────────────────────────
function buildNote(word, grade, enData, krMeaning, rootName, prefixName, prefixMeaning) {
  let pronunciation = "", pos = "", meaningEn = "", exampleEn = "";
  let synonyms = [], antonyms = [];

  if (enData) {
    for (const ph of enData.phonetics ?? []) {
      if (ph.text) { pronunciation = ph.text; break; }
    }
    const posMap = { noun:"명사", verb:"동사", adjective:"형용사", adverb:"부사",
                     preposition:"전치사", conjunction:"접속사", exclamation:"감탄사" };
    for (const m of enData.meanings ?? []) {
      if (!pos) pos = posMap[m.partOfSpeech] ?? m.partOfSpeech;
      for (const d of m.definitions ?? []) {
        if (!meaningEn) meaningEn = d.definition ?? "";
        if (!exampleEn) exampleEn = d.example ?? "";
        synonyms.push(...(d.synonyms ?? []));
        antonyms.push(...(d.antonyms ?? []));
      }
      synonyms.push(...(m.synonyms ?? []));
      antonyms.push(...(m.antonyms ?? []));
    }
    synonyms = [...new Set(synonyms)].slice(0, 4);
    antonyms = [...new Set(antonyms)].slice(0, 4);
  }

  const rootInfo    = ROOTS[rootName] ?? {};
  const prefixPart  = prefixName ? `${prefixName}(${prefixMeaning}) + ` : "";
  const rootPart    = rootName   ? `${rootName}(${rootInfo.meaning}) ` : "";
  const hint        = krMeaning || (meaningEn ? meaningEn.slice(0, 30) + "…" : word);
  const etymText    = (prefixName || rootName)
    ? `${prefixPart}${rootPart}→ '${hint}'의 의미가 됩니다`
    : "직접 어원을 찾아 써보세요!";

  const rootField   = rootName ? `[[${rootName}]]` : "없음";
  const synStr      = synonyms.length ? synonyms.map(s => `[[${s}]]`).join(", ") : "없음";
  const antStr      = antonyms.length ? antonyms.map(a => `[[${a}]]`).join(", ") : "없음";

  const related = [];
  if (rootName) related.push(`- [[${rootName}]]`);
  synonyms.slice(0,2).forEach(s => related.push(`- [[${s}]]`));
  if (!related.length) related.push("- (직접 추가해보세요)");

  return `---
단어: ${word}
발음: ${pronunciation}
품사: ${pos}
학년: ${grade}
어원: ${rootField}
유의어: [${synStr}]
반의어: [${antStr}]
---

# 📖 뜻
> **${word}** : ${krMeaning || "(번역 실패 — 직접 입력)"}
> (영어) ${meaningEn || "(영어 뜻 없음)"}

# 🌱 어원으로 추측하기
> ${etymText}

# 📌 예문
| 영어 | 한국어 |
|------|--------|
| ${exampleEn || "(예문 없음 — 직접 입력)"} | |

# ✏️ 나만의 예문 (직접 써보세요!)
> 예문 1:
> 예문 2:

# 🔗 꼬리에 꼬리를 무는 단어
${related.join("\n")}
`;
}

// ── UI ────────────────────────────────────────
let selectedVault = "haon";
let generatedMd   = "";

document.querySelectorAll(".toggle-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedVault = btn.dataset.vault;
  });
});

document.getElementById("wordInput").addEventListener("keydown", e => {
  if (e.key === "Enter") generate();
});

function setStatus(msg, type="") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status " + type;
}

async function generate() {
  const word = document.getElementById("wordInput").value.trim().toLowerCase();
  if (!word) { setStatus("단어를 입력해주세요.", "error"); return; }

  const btn = document.getElementById("generateBtn");
  btn.disabled = true;
  document.getElementById("resultSection").classList.remove("visible");
  setStatus("🔍 사전에서 정보 가져오는 중…", "loading");

  const grade = selectedVault === "haon" ? "중1" : "중3";

  const [enData, krMeaning] = await Promise.all([
    fetchEnglish(word),
    fetchKorean(word),
  ]);

  const rootName  = detectRoot(word);
  const [prefixName, prefixMeaning] = detectPrefix(word);

  generatedMd = buildNote(word, grade, enData, krMeaning, rootName, prefixName, prefixMeaning);

  // 정보 카드
  let pronunciation = "", pos = "", meaningEn = "", synonyms = [], antonyms = [];
  if (enData) {
    for (const ph of enData.phonetics ?? []) { if (ph.text) { pronunciation = ph.text; break; } }
    const posMap = { noun:"명사", verb:"동사", adjective:"형용사", adverb:"부사",
                     preposition:"전치사", conjunction:"접속사" };
    for (const m of enData.meanings ?? []) {
      if (!pos) pos = posMap[m.partOfSpeech] ?? m.partOfSpeech;
      for (const d of m.definitions ?? []) {
        if (!meaningEn) meaningEn = d.definition ?? "";
        synonyms.push(...(d.synonyms ?? []));
        antonyms.push(...(d.antonyms ?? []));
      }
    }
    synonyms = [...new Set(synonyms)].slice(0,4);
    antonyms = [...new Set(antonyms)].slice(0,4);
  }

  const rootInfo = ROOTS[rootName] ?? {};
  const grid = document.getElementById("infoGrid");
  grid.innerHTML = `
    <div class="info-item full">
      <div class="key">단어</div>
      <div class="val" style="font-size:22px;font-weight:700;color:#c084fc">${word}
        <span style="font-size:14px;color:#888;font-weight:400;margin-left:6px">${pronunciation}</span>
      </div>
    </div>
    <div class="info-item">
      <div class="key">한국어 뜻</div>
      <div class="val">${krMeaning || "—"}</div>
    </div>
    <div class="info-item">
      <div class="key">품사</div>
      <div class="val"><span class="badge">${pos || "—"}</span></div>
    </div>
    <div class="info-item full">
      <div class="key">영어 뜻</div>
      <div class="val" style="font-size:13px;color:#aaa">${meaningEn || "—"}</div>
    </div>
    ${rootName ? `
    <div class="info-item full">
      <div class="key">감지된 어원</div>
      <div class="val"><span class="root-tag">[[${rootName}]]</span>
        <span style="font-size:13px;color:#aaa;margin-left:8px">${rootInfo.meaning} (${rootInfo.origin})</span>
      </div>
    </div>` : ""}
    ${prefixName ? `
    <div class="info-item full">
      <div class="key">감지된 접두사</div>
      <div class="val"><span class="root-tag">${prefixName}</span>
        <span style="font-size:13px;color:#aaa;margin-left:8px">${prefixMeaning}</span>
      </div>
    </div>` : ""}
    ${synonyms.length ? `
    <div class="info-item full">
      <div class="key">유의어</div>
      <div class="val synonyms-row">${synonyms.map(s=>`<span class="synonym-tag">${s}</span>`).join("")}</div>
    </div>` : ""}
    ${antonyms.length ? `
    <div class="info-item full">
      <div class="key">반의어</div>
      <div class="val synonyms-row">${antonyms.map(a=>`<span class="antonym-tag">${a}</span>`).join("")}</div>
    </div>` : ""}
  `;

  document.getElementById("mdBox").textContent = generatedMd;
  document.getElementById("wordTitle").textContent = word;
  document.getElementById("resultSection").classList.add("visible");

  const grade_label = grade === "중1" ? "하온(중1)" : "하진(중3)";
  const extras = [];
  if (rootName) extras.push(`어원 [[${rootName}]]`);
  if (prefixName) extras.push(`접두사 ${prefixName}`);
  setStatus(`✅ ${word} — ${grade_label} ${extras.length ? "| " + extras.join(", ") : ""}`, "success");

  btn.disabled = false;
  document.getElementById("resultSection").scrollIntoView({ behavior: "smooth" });
}

async function copyMd() {
  if (!generatedMd) return;
  try {
    await navigator.clipboard.writeText(generatedMd);
    const btn = document.querySelector(".btn-copy");
    btn.textContent = "✅ 복사됨!";
    setTimeout(() => { btn.textContent = "📋 마크다운 복사"; }, 2000);
  } catch {
    // iOS fallback
    const ta = document.createElement("textarea");
    ta.value = generatedMd;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    const btn = document.querySelector(".btn-copy");
    btn.textContent = "✅ 복사됨!";
    setTimeout(() => { btn.textContent = "📋 마크다운 복사"; }, 2000);
  }
}
</script>
</body>
</html>
